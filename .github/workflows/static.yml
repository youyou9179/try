# 這是專門給 Vite 專案部署到 GitHub Pages 用的設定
name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"] # 如果你的分支叫 master，請改為 master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite 編譯後的資料夾名稱
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
